<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nemotron AI Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }

  body {
    background: #0f172a;
    color: #f8fafc;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 18px 24px;
    border-bottom: 1px solid rgba(255,255,255,.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #0b1220;
  }

  .logo { font-size: 20px; font-weight: 700; letter-spacing: .3px; }
  .badge {
    background: #1e293b;
    padding: 6px 12px;
    border-radius: 10px;
    font-size: 13px;
    color: #94a3b8;
  }

  .chat-container { flex: 1; overflow-y: auto; padding: 28px 16px; }

  .message { max-width: 820px; margin: 0 auto 18px auto; display: flex; }
  .message.user { justify-content: flex-end; }
  .message.assistant { justify-content: flex-start; }

  .bubble {
    padding: 14px 18px;
    border-radius: 18px;
    max-width: 82%;
    line-height: 1.6;
    white-space: pre-wrap;
    word-wrap: break-word;
    font-size: 15px;
  }
  .user .bubble { background: #2563eb; color: #fff; border-bottom-right-radius: 4px; }
  .assistant .bubble { background: #1e293b; color: #e2e8f0; border-bottom-left-radius: 4px; }
  .typing { opacity: .65; font-style: italic; }

  .input-area { padding: 16px; border-top: 1px solid rgba(255,255,255,.08); background: #0b1220; }
  .input-wrapper { max-width: 900px; margin: auto; display: flex; gap: 10px; align-items: flex-end; }

  textarea {
    flex: 1;
    min-height: 54px;
    max-height: 200px;
    resize: none;
    border: 1px solid rgba(255,255,255,.08);
    outline: none;
    padding: 15px;
    border-radius: 16px;
    background: #1e293b;
    color: #fff;
    font-size: 15px;
  }
  textarea:focus { border-color: #2563eb; }

  button {
    border: none;
    cursor: pointer;
    min-width: 110px;
    height: 54px;
    border-radius: 16px;
    background: #2563eb;
    color: #fff;
    font-weight: 600;
    font-size: 15px;
    transition: background .15s ease;
  }
  button:hover { background: #1d4ed8; }
  button:disabled { background: #334155; cursor: not-allowed; }

  .hint { max-width: 900px; margin: 8px auto 0; font-size: 12px; color: #64748b; text-align: center; }
</style>
</head>
<body>

<header>
  <div class="logo">Nemotron AI</div>
  <div class="badge">Powered by NVIDIA</div>
</header>

<div class="chat-container" id="chatContainer">
  <div class="message assistant">
    <div class="bubble">Hello! How can I help you today?</div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrapper">
    <textarea id="prompt" placeholder="Ask anything..."></textarea>
    <button id="sendBtn" onclick="sendMessage()">Send</button>
  </div>
  <div class="hint">Press Enter to send · Shift + Enter for a new line</div>
</div>

<script>
  const history = [];

  async function sendMessage() {
    const input = document.getElementById("prompt");
    const sendBtn = document.getElementById("sendBtn");
    const message = input.value.trim();
    if (!message) return;

    addMessage(message, "user");
    history.push({ role: "user", content: message });
    input.value = "";
    sendBtn.disabled = true;

    const placeholder = addMessage("Thinking...", "assistant", true);

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message, history: history.slice(0, -1) })
      });

      const data = await res.json();
      const reply = data.response || data.error || "No response.";
      placeholder.classList.remove("typing");
      placeholder.innerText = reply;
      history.push({ role: "assistant", content: reply });
    } catch (err) {
      placeholder.classList.remove("typing");
      placeholder.innerText = "Error connecting to AI service.";
      console.error(err);
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  function addMessage(text, role, isTyping = false) {
    const container = document.getElementById("chatContainer");
    const wrapper = document.createElement("div");
    wrapper.className = `message ${role}`;
    const bubble = document.createElement("div");
    bubble.className = "bubble" + (isTyping ? " typing" : "");
    bubble.innerText = text;
    wrapper.appendChild(bubble);
    container.appendChild(wrapper);
    container.scrollTop = container.scrollHeight;
    return bubble;
  }

  document.getElementById("prompt").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>

</body>
</html>
